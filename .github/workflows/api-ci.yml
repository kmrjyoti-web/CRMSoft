name: API CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'API/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'API/**'

concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────
  # 1. TypeScript type-check + lint
  # ──────────────────────────────────────────
  lint-and-typecheck:
    name: API — Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: API

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: API/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit -p tsconfig.json

      - name: Lint
        run: npm run lint -- --max-warnings 2500

  # ──────────────────────────────────────────
  # 2. Unit tests (no DB required)
  # ──────────────────────────────────────────
  unit-tests:
    name: API — Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: API

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: API/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma clients
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://localhost:5432/placeholder
          IDENTITY_DATABASE_URL: postgresql://localhost:5432/placeholder
          PLATFORM_DATABASE_URL: postgresql://localhost:5432/placeholder
          GLOBAL_WORKING_DATABASE_URL: postgresql://localhost:5432/placeholder

      - name: Run unit tests
        run: npm run test:unit -- --ci --passWithNoTests --coverage --coverageReporters=lcov
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci-${{ github.run_id }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage-unit
          path: API/coverage/
          retention-days: 7

  # ──────────────────────────────────────────
  # 3. Build
  # ──────────────────────────────────────────
  build:
    name: API — Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]
    defaults:
      run:
        working-directory: API

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: API/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://localhost:5432/placeholder
          IDENTITY_DATABASE_URL: postgresql://localhost:5432/placeholder
          PLATFORM_DATABASE_URL: postgresql://localhost:5432/placeholder
          GLOBAL_WORKING_DATABASE_URL: postgresql://localhost:5432/placeholder

  # ──────────────────────────────────────────
  # 4. E2E tests (mocked DB, runs on main only)
  # ──────────────────────────────────────────
  e2e-tests:
    name: API — E2E Tests (mocked)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: API

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: API/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma clients
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://localhost:5432/placeholder
          IDENTITY_DATABASE_URL: postgresql://localhost:5432/placeholder
          PLATFORM_DATABASE_URL: postgresql://localhost:5432/placeholder
          GLOBAL_WORKING_DATABASE_URL: postgresql://localhost:5432/placeholder

      - name: Run E2E tests
        run: npm run test:e2e -- --ci --passWithNoTests
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci-${{ github.run_id }}
          PLATFORM_DATABASE_URL: postgresql://localhost:5432/placeholder
          IDENTITY_DATABASE_URL: postgresql://localhost:5432/placeholder
          GLOBAL_WORKING_DATABASE_URL: postgresql://localhost:5432/placeholder

  # ──────────────────────────────────────────
  # 5. Docker build (dry-run, main only)
  # ──────────────────────────────────────────
  docker:
    name: API — Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./API
          push: false
          tags: crmsoft-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

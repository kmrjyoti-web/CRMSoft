name: CI — vendor-panel

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'apps-frontend/vendor-panel/**'
      - '.github/workflows/ci-vendor-panel.yml'
  push:
    branches: [develop]
    paths:
      - 'apps-frontend/vendor-panel/**'

concurrency:
  group: ci-vendor-panel-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  NODE_OPTIONS: '--max-old-space-size=4096'
  APP_DIR: 'apps-frontend/vendor-panel'

jobs:
  # ─────────────────────────────────────────────
  # ⚠️ Typecheck non-blocking in V5 — jest.config.ts(46) hits a
  # transitive jest@30 type-tree quirk in CI that doesn't reproduce
  # locally (local tsc returns 0; CI returns 1 in jest.config.ts).
  # Fix in a follow-up: tighten Config typing or pin a single jest
  # version across the workspace. Until then, treat as non-blocking
  # (matches the crm-admin tsc and backend lint patterns).
  # ─────────────────────────────────────────────
  typecheck:
    name: Type check (tsc) — non-blocking v5
    runs-on: ubuntu-latest
    timeout-minutes: 8
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - name: Install (workspace root)
        run: pnpm install --frozen-lockfile
      - name: tsc --noEmit
        working-directory: ${{ env.APP_DIR }}
        run: pnpm exec tsc --noEmit

  # ⚠️ Lint is non-blocking in v1 — tighten in follow-up sprint.
  lint:
    name: Lint — non-blocking v1
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - name: Install (workspace root)
        run: pnpm install --frozen-lockfile
      - name: next lint
        working-directory: ${{ env.APP_DIR }}
        run: pnpm lint
        continue-on-error: true

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'
      - name: Install (workspace root)
        run: pnpm install --frozen-lockfile
      - name: Build (generate-routes + next build)
        working-directory: ${{ env.APP_DIR }}
        env:
          NEXT_PUBLIC_API_URL: 'http://localhost:3001'
          NEXT_TELEMETRY_DISABLED: '1'
        run: pnpm build

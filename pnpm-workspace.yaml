# CRMSoft V6 — pnpm workspace configuration
# Updated: 2026-04-24 (real-code-merge-gv-vertical sprint)

packages:
  # ── V5 Apps (active — CI workflows hardcode these paths) ──────────────────
  # apps-backend/api: ci-backend.yml triggers on apps-backend/api/**
  # apps-frontend/*: ci-crm-admin.yml, ci-vendor-panel.yml trigger here
  # DO NOT remove until CI is updated to reference apps/backend/api
  - 'apps-backend/*'
  - 'apps-frontend/*'

  # ── V6 Apps (new structure — being populated via migration PRs) ───────────
  - 'apps/backend/*'
  - 'apps/frontend/*'

  # ── V6 Core Packages ──────────────────────────────────────────────────────
  - 'core/platform'
  - 'core/ai-engine'
  - 'core/base-modules/*'
  - 'core/shared-libraries'
  - 'core/governance'

  # ── V6 General Vertical (real modules — 52 NestJS modules copied) ─────────
  - 'verticals/general'
  - 'verticals/general/modules/crm'
  - 'verticals/general/modules/accounting'
  - 'verticals/general/modules/inventory'
  - 'verticals/general/modules/communication'
  - 'verticals/general/modules/platform'

  # ── V6 Other Verticals ────────────────────────────────────────────────────
  - 'verticals/travel'
  - 'verticals/electronic'
  - 'verticals/restaurant'
  - 'verticals/tourism'
  - 'verticals/retail'
  - 'verticals/software'

  # ── V6 Partner Customizations ─────────────────────────────────────────────
  - 'partner-customizations/*'

  # ── V6 Brands ─────────────────────────────────────────────────────────────
  - 'brands/*'

  # ── Tools ─────────────────────────────────────────────────────────────────
  - 'tools/*'


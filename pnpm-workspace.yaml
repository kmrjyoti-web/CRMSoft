# CRMSoft V6 — pnpm workspace configuration
# Updated: 2026-04-25 (V6 visual cleanup sprint)

packages:
  # ── V5 Apps (active — CI workflows hardcode these paths) ──────────────────
  # apps-backend/api: ci-backend.yml triggers on apps-backend/api/**
  # apps-frontend/*: ci-crm-admin.yml, ci-vendor-panel.yml trigger here
  # DO NOT remove until CI is updated to reference apps/backend/api
  - 'apps-backend/*'
  - 'apps-frontend/*'

  # ── V6 Apps (new structure — being populated via migration PRs) ───────────
  - 'apps/backend/*'
  - 'apps/frontend/*'

  # ── V6 Core Packages ──────────────────────────────────────────────────────
  - 'core/platform'
  - 'core/ai-engine'
  - 'core/base-modules/*'
  - 'core/shared-libraries'
  - 'core/governance'

  # ── V6 Verticals ──────────────────────────────────────────────────────────
  - 'verticals/*'

  # ── V6 Partner Customizations ─────────────────────────────────────────────
  - 'partner-customizations/*'

  # ── V6 Brands ─────────────────────────────────────────────────────────────
  - 'brands/*'

  # ── Tools ─────────────────────────────────────────────────────────────────
  - 'tools/*'

# ── Removed (archived) ────────────────────────────────────────────────────────
#   packages-backend/*        → archive/old-v5-structure/packages-backend/
#   packages-frontend/*       → archive/old-v5-structure/packages-frontend/
#   packages-shared/*         → archive/old-v5-structure/packages-shared/
#   Shared/common             → archive/legacy-folders/Shared/common/
#   Shared/frontend           → archive/legacy-folders/Shared/frontend/
#   Shared/prisma-schemas     → archive/legacy-folders/Shared/prisma-schemas/
#   Shared/backend/*          → archive/legacy-folders/Shared/backend/
#   WhiteLabel/wl-api         → archive/legacy-folders/WhiteLabel/wl-api/
